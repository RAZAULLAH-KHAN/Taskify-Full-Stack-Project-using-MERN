trigger:
  branches:
    include:
      - main
      - feature/dockerize-app
  paths:
    include:
      - server/**

variables:
  - group: taskapp-variables
  - name: imageTag
    value: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    
    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: login
        containerRegistry: acr-service-connection
        
    - task: Docker@2
      displayName: 'Build Backend Image'
      inputs:
        command: build
        repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
        dockerfile: server/Dockerfile
        buildContext: server/
        tags: |
          $(imageTag)
          latest
          
    - task: Docker@2
      displayName: 'Push Backend Image to ACR'
      inputs:
        command: push
        repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
        tags: |
          $(imageTag)
          latest

- stage: DeployProd
  displayName: 'Deploy to App Service'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployProdJob
    environment: 'production'
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Deploy Backend to App Service'
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              appName: $(BACKEND_APP_NAME)
              containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)